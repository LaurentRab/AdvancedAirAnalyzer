; PlatformIO Project Configuration File — AdvancedAirAnalyzer
; ─────────────────────────────────────────────────────────────
; Deux environnements :
;   lolin_c3_mini       → upload USB (développement)
;   lolin_c3_mini_ota   → upload WiFi OTA  (production)
;
; Usage OTA : pio run -e lolin_c3_mini_ota -t upload

[common]
platform    = espressif32
board       = lolin_c3_mini
framework   = arduino
monitor_speed = 115200
monitor_dtr = 1
monitor_rts = 1

; FORCE LA RECHERCHE PROFONDE DES HEADERS
lib_ldf_mode = deep+

build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -std=gnu++17
    ; On adapte le chemin car le nom du dossier cloné sera celui du dépôt
    -L.pio/libdeps/lolin_c3_mini/bsec2/src/esp32c3
    -L.pio/libdeps/lolin_c3_mini_ota/bsec2/src/esp32c3
    -lalgobsec

lib_deps =
    sensirion/Sensirion I2C SCD4x @ ^0.4.0
    ; Noms officiels du registre (les versions qui s'installaient bien)

    ; Ce driver s'installe bien et contient bme68xLibrary.h
    boschsensortec/BME68x Sensor library @ ^1.1.40407
    ; On court-circuite le registre PlatformIO pour BSEC2
    https://github.com/boschsensortec/Bosch-BSEC2-Library.git

    fu-hsi/PMS Library @ ^1.1.0
    knolleary/PubSubClient @ ^2.8

; ── Environnement USB (flash initiale ou debug) ─────────────
[env:lolin_c3_mini]
extends = common

; ── Environnement OTA (mises à jour sans câble) ─────────────
; Si AdvancedAirAnalyzer.local ne résout pas (mDNS instable),
; remplacer par l'IP affichée dans le moniteur série au boot.
[env:lolin_c3_mini_ota]
extends = common
upload_protocol = espota
upload_port     = AdvancedAirAnalyzer.local
upload_flags    = --auth=air_ota_2024

; ── Environnement OTA par IP (secours si mDNS échoue) ───────
; Remplacer 192.168.68.XX par l'IP réelle de l'appareil.
; [env:lolin_c3_mini_ota_ip]
; extends = common
; upload_protocol = espota
; upload_port     = 192.168.68.XX
; upload_flags    = --auth=air_ota_2024
